<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" opacity="0.08"/>
  
  <!-- 主图形：原点 + 层叠结构（代表CMS内容层级） -->
  <g transform="translate(256, 256)">
    <!-- 外层六边形（代表管理框架） -->
    <polygon points="0,-200 173,-100 173,100 0,200 -173,100 -173,-100" 
             fill="none" stroke="url(#grad1)" stroke-width="14" opacity="0.25"/>
    
    <!-- 中层六边形 -->
    <polygon points="0,-140 121,-70 121,70 0,140 -121,70 -121,-70" 
             fill="none" stroke="url(#grad1)" stroke-width="12" opacity="0.5"/>
    
    <!-- 内层六边形 -->
    <polygon points="0,-85 74,-42.5 74,42.5 0,85 -74,42.5 -74,-42.5" 
             fill="url(#grad1)"/>
    
    <!-- 中心原点（origin point） -->
    <circle cx="0" cy="0" r="28" fill="#fff"/>
    
    <!-- 管理节点装饰 -->
    <circle cx="0" cy="-140" r="16" fill="url(#grad2)"/>
    <circle cx="121" cy="70" r="16" fill="url(#grad2)"/>
    <circle cx="-121" cy="70" r="16" fill="url(#grad2)"/>
  </g>
</svg>
