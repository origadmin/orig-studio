project_name: orig-cms

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - '^refactor:'
      - '^style:'
      - '^perf:'

builds:
  - id: "server"
    main: ./cmd/server/
    binary: origcms-server
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
      - -tags=dev
    ldflags:
      - -s -w -extldflags "-static"
      - -X github.com/origadmin/toolkits/version.Version={{.Version}}
      - -X github.com/origadmin/toolkits/version.GitCommit={{.Commit}}
      - -X github.com/origadmin/toolkits/version.BuildDate={{.Date}}

archives:
  - id: "{{ .ProjectName }}"
    format_overrides:
      - goos: windows
        format: zip
    name_template: >
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - resources/configs/**/*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

dockers:
  - id: "server"
    builds:
      - server
    image_templates:
      - "ghcr.io/origadmin/orig-cms/server:{{ .Tag }}"
      - "ghcr.io/origadmin/orig-cms/server:latest"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - --platform=linux/amd64
      - --build-arg=SERVICE_NAME=server
    extra_files:
      - LICENSE
      - README.md
      - resources/

release:
  github:
    owner: 'origadmin'
    name: 'orig-media'
  draft: false
  prerelease: auto
  name_template: 'OrigCMS CE {{ .Version }}'
  header: |
    ## OrigCMS Community Edition

    Full-featured content management system with media transcoding.
  footer: |
    ## Installation

    ```bash
    # Download from assets below, then:
    ./origcms-server -conf bootstrap.yaml
    ```

    ## Docker

    ```bash
    docker pull ghcr.io/origadmin/orig-cms/server:{{ .Tag }}
    ```
