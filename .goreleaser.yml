# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# Project name (default is the name of the repository)
project_name: orig-cms

# This will be used for the changelog and release notes
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - '^refactor:'
      - '^style:'
      - '^perf:'

# Build configuration
builds:
  - id: "svc-api-gateway"
    main: ./cmd/svc-api-gateway/
    binary: svc-api-gateway
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/origadmin/toolkits/version.Version={{.Version}}
      - -X github.com/origadmin/toolkits/version.GitCommit={{.Commit}}
      - -X github.com/origadmin/toolkits/version.GitBranch={{.Branch}}
      - -X github.com/origadmin/toolkits/version.BuildDate={{.Date}}

  - id: "svc-user"
    main: ./cmd/svc-user/
    binary: svc-user
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/origadmin/toolkits/version.Version={{.Version}}
      - -X github.com/origadmin/toolkits/version.GitCommit={{.Commit}}
      - -X github.com/origadmin/toolkits/version.GitBranch={{.Branch}}
      - -X github.com/origadmin/toolkits/version.BuildDate={{.Date}}

  - id: "svc-media"
    main: ./cmd/svc-media/
    binary: svc-media
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/origadmin/toolkits/version.Version={{.Version}}
      - -X github.com/origadmin/toolkits/version.GitCommit={{.Commit}}
      - -X github.com/origadmin/toolkits/version.GitBranch={{.Branch}}
      - -X github.com/origadmin/toolkits/version.BuildDate={{.Date}}

  - id: "svc-content"
    main: ./cmd/svc-content/
    binary: svc-content
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/origadmin/toolkits/version.Version={{.Version}}
      - -X github.com/origadmin/toolkits/version.GitCommit={{.Commit}}
      - -X github.com/origadmin/toolkits/version.GitBranch={{.Branch}}
      - -X github.com/origadmin/toolkits/version.BuildDate={{.Date}}

  - id: "server"
    main: ./cmd/server/
    binary: server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/origadmin/toolkits/version.Version={{.Version}}
      - -X github.com/origadmin/toolkits/version.GitCommit={{.Commit}}
      - -X github.com/origadmin/toolkits/version.GitBranch={{.Branch}}
      - -X github.com/origadmin/toolkits/version.BuildDate={{.Date}}
    hooks:
      pre:
        - cmd: sh -c "cd web && bun install && bun run build && rm -rf ../internal/frontend/dist && cp -r dist ../internal/frontend/dist"
          output: true

# Archive configuration
archives:
  - id: "{{ .ProjectName }}"
    format_overrides:
      - goos: windows
        format: zip
    name_template: >
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

# Checksum configuration
checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# Docker configuration
dockers:
  - id: "svc-api-gateway"
    builds:
      - svc-api-gateway
    image_templates:
      - "ghcr.io/origadmin/orig-cms/svc-api-gateway:{{ .Tag }}"
      - "ghcr.io/origadmin/orig-cms/svc-api-gateway:latest"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - --build-arg=service_name=svc-api-gateway
    extra_files:
      - LICENSE
      - README.md

  - id: "svc-user"
    builds:
      - svc-user
    image_templates:
      - "ghcr.io/origadmin/orig-cms/svc-user:{{ .Tag }}"
      - "ghcr.io/origadmin/orig-cms/svc-user:latest"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - --build-arg=service_name=svc-user
    extra_files:
      - LICENSE
      - README.md

  - id: "svc-media"
    builds:
      - svc-media
    image_templates:
      - "ghcr.io/origadmin/orig-cms/svc-media:{{ .Tag }}"
      - "ghcr.io/origadmin/orig-cms/svc-media:latest"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - --build-arg=service_name=svc-media
    extra_files:
      - LICENSE
      - README.md

  - id: "svc-content"
    builds:
      - svc-content
    image_templates:
      - "ghcr.io/origadmin/orig-cms/svc-content:{{ .Tag }}"
      - "ghcr.io/origadmin/orig-cms/svc-content:latest"
    dockerfile: Dockerfile
    use: buildx
    build_flag_templates:
      - --build-arg=service_name=svc-content
    extra_files:
      - LICENSE
      - README.md

  - id: "server"
    builds:
      - server
    image_templates:
      - "ghcr.io/origadmin/orig-cms/server:{{ .Tag }}"
      - "ghcr.io/origadmin/orig-cms/server:latest"
    dockerfile: Dockerfile.server
    use: buildx
    extra_files:
      - LICENSE
      - README.md
      - configs/bootstrap.yaml

# GitHub/GitLab/Gitea releases configuration
release:
  github:
    owner: 'origadmin'
    name: 'orig-cms'
  draft: false
  prerelease: false
  name_template: '{{ .ProjectName }} {{ .Version }}'
  footer: |
    ## Changelog

    See the [CHANGELOG](https://github.com/origadmin/orig-cms/blob/main/CHANGELOG.md) for more information.

