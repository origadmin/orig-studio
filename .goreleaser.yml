version: 2

project_name: orig-cms

before:
  hooks:
    - go mod tidy

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - '^refactor:'
      - '^style:'
      - '^perf:'

builds:
  - id: "server"
    main: ./cmd/server/
    binary: origcms-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
      - -tags=dev
    ldflags:
      - -s -w
      - -X github.com/origadmin/toolkits/version.version={{.Version}}
      - -X github.com/origadmin/toolkits/version.gitCommit={{.ShortCommit}}
      - -X github.com/origadmin/toolkits/version.gitTag={{.Tag}}
      - -X github.com/origadmin/toolkits/version.buildDate={{.Date}}
      - -X github.com/origadmin/toolkits/version.gitTreeState=clean

archives:
  - id: orig-cms
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE*
      - README*
      - resources/configs/**/*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ .Version }}-next"

release:
  github:
    owner: origadmin
    name: orig-studio
  draft: false
  prerelease: auto
  name_template: 'OrigCMS CE {{ .Version }}'
  header: |
    ## OrigCMS Community Edition

    Full-featured content management system with media transcoding.
  footer: |
    ## Installation

    ```bash
    # Download from assets below, then:
    ./origcms-server -conf bootstrap.yaml
    ```
