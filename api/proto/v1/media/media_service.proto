// ========== Media Messages ==========

message ListMediasRequest {
  int32 page = 1 [json_name = "page"];
  int32 page_size = 2 [json_name = "page_size"];
  string page_token = 3 [json_name = "page_token"];
  string keyword = 4 [json_name = "keyword"];
  optional int32 type = 5 [json_name = "type"];
  optional int32 status = 6 [json_name = "status"];
  optional int64 category_id = 7 [json_name = "category_id"];
  optional string user_id = 8 [json_name = "user_id"];
  string order_by = 9 [json_name = "order_by"];
  bool descending = 10 [json_name = "descending"];
}

message ListMediasResponse {
  int32 total = 1 [json_name = "total"];
  repeated api.v1.services.types.Media items = 2 [json_name = "items"];
  int32 page = 3 [json_name = "page"];
  int32 page_size = 4 [json_name = "page_size"];
  string next_page_token = 5 [json_name = "next_page_token"];
  int32 total_pages = 6 [json_name = "total_pages"];
}

message GetMediaRequest {
  string id = 1;
}

message GetMediaResponse {
  api.v1.services.types.Media media = 1 [json_name = "media"];
}

message CreateMediaRequest {
  api.v1.services.types.Media media = 1;
}

message CreateMediaResponse {
  api.v1.services.types.Media media = 1 [json_name = "media"];
}

message UpdateMediaRequest {
  api.v1.services.types.Media media = 1 [json_name = "media"];
  google.protobuf.FieldMask update_mask = 2 [json_name = "update_mask"];
}

message UpdateMediaResponse {
  api.v1.services.types.Media media = 1 [json_name = "media"];
}

message DeleteMediaRequest {
  string id = 1;
}

message DeleteMediaResponse {
  google.protobuf.Empty empty = 1 [json_name = "empty"];
}

message IncrementViewCountRequest {
  string id = 1;
}

message IncrementViewCountResponse {
  int64 view_count = 1 [json_name = "view_count"];
}

message UploadMediaRequest {
  string title = 1 [json_name = "title"];
  string description = 2 [json_name = "description"];
  string type = 3 [json_name = "type"];
  string file_path = 4 [json_name = "file_path"];
  int64 size = 5 [json_name = "size"];
  int32 duration = 6 [json_name = "duration"];
  string user_id = 7 [json_name = "user_id"];
}

message UploadMediaResponse {
  api.v1.services.types.Media media = 1 [json_name = "media"];
}

message GetMediaStreamRequest {
  string id = 1;
}

message GetMediaStreamResponse {
  string stream_url = 1 [json_name = "stream_url"];
  string format = 2 [json_name = "format"];
}

message GetMediaDownloadRequest {
  string id = 1;
}

message GetMediaDownloadResponse {
  string download_url = 1 [json_name = "download_url"];
  string filename = 2 [json_name = "filename"];
}

message GetMediaThumbnailRequest {
  string id = 1;
}

message GetMediaThumbnailResponse {
  string thumbnail_url = 1 [json_name = "thumbnail_url"];
}

// ========== Encoding Messages ==========

message ListEncodingTasksRequest {
  string media_id = 1 [json_name = "media_id"];
}

message ListEncodingTasksResponse {
  repeated api.v1.services.types.EncodingTask tasks = 1 [json_name = "tasks"];
}

message GetMediaVariantsRequest {
  string id = 1;
}

message GetMediaVariantsResponse {
  repeated api.v1.services.types.MediaVariant variants = 1 [json_name = "variants"];
}

message RetryEncodingTaskRequest {
  string media_id = 1 [json_name = "media_id"];
  string task_id = 2 [json_name = "task_id"];
}

message RetryEncodingTaskResponse {
  api.v1.services.types.EncodingTask task = 1 [json_name = "task"];
}

message GetEncodingStatusRequest {
  optional string user_id = 1 [json_name = "user_id"];
  string status = 2 [json_name = "status"];
  int32 page = 3 [json_name = "page"];
  int32 page_size = 4 [json_name = "page_size"];
}

message GetEncodingStatusResponse {
  int32 processing_count = 1 [json_name = "processing_count"];
  int32 pending_count = 2 [json_name = "pending_count"];
  int32 failed_count = 3 [json_name = "failed_count"];
  int32 success_count = 4 [json_name = "success_count"];
  int32 total = 5 [json_name = "total"];
  int32 page = 6 [json_name = "page"];
  int32 page_size = 7 [json_name = "page_size"];
  repeated TranscodingMediaItem items = 8 [json_name = "items"];
  int32 total_pages = 9 [json_name = "total_pages"];
}

message ListAllEncodingTasksRequest {
  string status = 1 [json_name = "status"];
  int32 page = 2 [json_name = "page"];
  int32 page_size = 3 [json_name = "page_size"];
  optional string media_id = 4 [json_name = "media_id"];
}

message ListAllEncodingTasksResponse {
  int32 total = 1 [json_name = "total"];
  repeated api.v1.services.types.EncodingTask tasks = 2 [json_name = "tasks"];
  int32 page = 3 [json_name = "page"];
  int32 page_size = 4 [json_name = "page_size"];
  int32 total_pages = 5 [json_name = "total_pages"];
}

message RetryAllFailedTasksRequest {
  optional string media_id = 1 [json_name = "media_id"];
}

message RetryAllFailedTasksResponse {
  int32 retried_count = 1 [json_name = "retried_count"];
}

message TranscodingMediaItem {
  api.v1.services.types.Media media = 1 [json_name = "media"];
  repeated api.v1.services.types.EncodingTask tasks = 2 [json_name = "tasks"];
}

// ========== Like Messages ==========

message GetMediaLikesRequest {
  string media_id = 1;
}

message GetMediaLikesResponse {
  int64 like_count = 1 [json_name = "like_count"];
  int64 dislike_count = 2 [json_name = "dislike_count"];
  bool is_liked = 3 [json_name = "is_liked"];
  bool is_disliked = 4 [json_name = "is_disliked"];
}

message ToggleMediaLikeRequest {
  string media_id = 1 [json_name = "media_id"];
  string type = 2 [json_name = "type"]; // "like" or "dislike"
}

message ToggleMediaLikeResponse {
  bool is_liked = 1 [json_name = "is_liked"];
  bool is_disliked = 2 [json_name = "is_disliked"];
  int64 like_count = 3 [json_name = "like_count"];
  int64 dislike_count = 4 [json_name = "dislike_count"];
}

message DeleteMediaLikeRequest {
  string media_id = 1 [json_name = "media_id"];
}

message DeleteMediaLikeResponse {
  bool success = 1 [json_name = "success"];
}

// ========== Favorite Messages ==========

message GetMediaFavoritesRequest {
  string media_id = 1;
