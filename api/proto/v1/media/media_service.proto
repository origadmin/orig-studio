syntax = "proto3";

package api.v1.services.media;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "v1/types/media.proto";
import "v1/types/user.proto";

option go_package = "origadmin/application/origstudio/api/gen/v1/media;media";
option java_multiple_files = true;
option java_outer_classname = "OrigStudioServiceMediaProto";
option java_package = "com.origstudio.api.v1.services.media";
option objc_class_prefix = "OrigStudioMedia";

// The media service definition.
service MediaService {
  // ========== Media CRUD ==========

  // ListMedias returns a list of medias.
  rpc ListMedias(ListMediasRequest) returns (ListMediasResponse) {
    option (google.api.http) = {get: "/api/v1/medias"};
  }

  // GetMedia returns a media by ID.
  rpc GetMedia(GetMediaRequest) returns (GetMediaResponse) {
    option (google.api.http) = {get: "/api/v1/medias/{id}"};
  }

  // CreateMedia creates a new media.
  rpc CreateMedia(CreateMediaRequest) returns (CreateMediaResponse) {
    option (google.api.http) = {
      post: "/api/v1/medias"
      body: "*"
    };
  }

  // UpdateMedia updates an existing media.
  rpc UpdateMedia(UpdateMediaRequest) returns (UpdateMediaResponse) {
    option (google.api.http) = {
      put: "/api/v1/medias/{media.id}"
      body: "*"
    };
  }

  // DeleteMedia deletes a media.
  rpc DeleteMedia(DeleteMediaRequest) returns (DeleteMediaResponse) {
    option (google.api.http) = {delete: "/api/v1/medias/{id}"};
  }

  // ========== Media Interactions ==========

  // IncrementViewCount increments the view count of a media.
  rpc IncrementViewCount(IncrementViewCountRequest) returns (IncrementViewCountResponse) {
    option (google.api.http) = {
      post: "/api/v1/medias/{id}/view"
      body: "*"
    };
  }

  // UploadMedia uploads a media file.
  rpc UploadMedia(UploadMediaRequest) returns (UploadMediaResponse) {
    option (google.api.http) = {
      post: "/api/v1/medias/upload"
      body: "*"
    };
  }

  // GetMediaStream returns the streaming URL for a media.
  rpc GetMediaStream(GetMediaStreamRequest) returns (GetMediaStreamResponse) {
    option (google.api.http) = {get: "/api/v1/medias/{id}/stream"};
  }

  // GetMediaDownload returns the download URL for a media.
  rpc GetMediaDownload(GetMediaDownloadRequest) returns (GetMediaDownloadResponse) {
    option (google.api.http) = {get: "/api/v1/medias/{id}/download"};
  }

  // GetMediaThumbnail returns the thumbnail URL for a media.
  rpc GetMediaThumbnail(GetMediaThumbnailRequest) returns (GetMediaThumbnailResponse) {
    option (google.api.http) = {get: "/api/v1/medias/{id}/thumbnail"};
  }

  // ========== Media Encoding ==========

  // ListEncodingTasks returns a list of encoding tasks for a media.
  rpc ListEncodingTasks(ListEncodingTasksRequest) returns (ListEncodingTasksResponse) {
    option (google.api.http) = {get: "/api/v1/medias/{media_id}/tasks"};
  }

  // GetMediaVariants returns the available variants for a media.
  rpc GetMediaVariants(GetMediaVariantsRequest) returns (GetMediaVariantsResponse) {
    option (google.api.http) = {get: "/api/v1/medias/{id}/variants"};
  }

  // RetryEncodingTask retries a specific encoding task.
  rpc RetryEncodingTask(RetryEncodingTaskRequest) returns (RetryEncodingTaskResponse) {
    option (google.api.http) = {
      post: "/api/v1/medias/{media_id}/tasks/{task_id}/retry"
      body: "*"
    };
  }

  // GetEncodingStatus returns the overall encoding status of the system.
  rpc GetEncodingStatus(GetEncodingStatusRequest) returns (GetEncodingStatusResponse) {
    option (google.api.http) = {get: "/api/v1/medias/encoding/status"};
  }

  // ListAllEncodingTasks returns a flat list of all encoding tasks (admin view).
  rpc ListAllEncodingTasks(ListAllEncodingTasksRequest) returns (ListAllEncodingTasksResponse) {
    option (google.api.http) = {get: "/api/v1/medias/encoding/tasks"};
  }

  // RetryAllFailedTasks retries all failed encoding tasks.
  rpc RetryAllFailedTasks(RetryAllFailedTasksRequest) returns (RetryAllFailedTasksResponse) {
    option (google.api.http) = {
      post: "/api/v1/medias/encoding/retry-failed"
      body: "*"
    };
  }

  // ========== Media Likes ==========

  // GetMediaLikes returns the like status for a media.
  rpc GetMediaLikes(GetMediaLikesRequest) returns (GetMediaLikesResponse) {
    option (google.api.http) = {get: "/api/v1/medias/{media_id}/likes"};
  }

  // ToggleMediaLike toggles like status for a media.
  rpc ToggleMediaLike(ToggleMediaLikeRequest) returns (ToggleMediaLikeResponse) {
    option (google.api.http) = {
      post: "/api/v1/medias/{media_id}/likes"
      body: "*"
    };
  }

  // DeleteMediaLike removes like from a media.
  rpc DeleteMediaLike(DeleteMediaLikeRequest) returns (DeleteMediaLikeResponse) {
    option (google.api.http) = {delete: "/api/v1/medias/{media_id}/likes"};
  }

  // ========== Media Favorites ==========

  // GetMediaFavorites returns the favorite status for a media.
  rpc GetMediaFavorites(GetMediaFavoritesRequest) returns (GetMediaFavoritesResponse) {
    option (google.api.http) = {get: "/api/v1/medias/{media_id}/favorites"};
  }

  // ToggleMediaFavorite toggles favorite status for a media.
  rpc ToggleMediaFavorite(ToggleMediaFavoriteRequest) returns (ToggleMediaFavoriteResponse) {
    option (google.api.http) = {
      post: "/api/v1/medias/{media_id}/favorites"
      body: "*"
    };
  }

  // DeleteMediaFavorite removes favorite from a media.
  rpc DeleteMediaFavorite(DeleteMediaFavoriteRequest) returns (DeleteMediaFavoriteResponse) {
    option (google.api.http) = {delete: "/api/v1/medias/{media_id}/favorites"};
  }

  // ========== Media Shares ==========

  // GetMediaShares returns share statistics for a media.
  rpc GetMediaShares(GetMediaSharesRequest) returns (GetMediaSharesResponse) {
    option (google.api.http) = {get: "/api/v1/medias/{media_id}/shares"};
  }

  // CreateMediaShare creates a share record for a media.
  rpc CreateMediaShare(CreateMediaShareRequest) returns (CreateMediaShareResponse) {
    option (google.api.http) = {
      post: "/api/v1/medias/{media_id}/shares"
      body: "*"
    };
  }

  // ========== Media Comments ==========

  // GetMediaComments returns comments for a media.
  rpc GetMediaComments(GetMediaCommentsRequest) returns (GetMediaCommentsResponse) {
    option (google.api.http) = {get: "/api/v1/medias/{media_id}/comments"};
  }

  // ========== Media Subtitles ==========

  // GetMediaSubtitles returns subtitles for a media.
  rpc GetMediaSubtitles(GetMediaSubtitlesRequest) returns (GetMediaSubtitlesResponse) {
    option (google.api.http) = {get: "/api/v1/medias/{media_id}/subtitles"};
  }

  // CreateMediaSubtitle uploads a subtitle for a media.
  rpc CreateMediaSubtitle(CreateMediaSubtitleRequest) returns (CreateMediaSubtitleResponse) {
    option (google.api.http) = {
      post: "/api/v1/medias/{media_id}/subtitles"
      body: "*"
    };
  }

  // ========== Media Metadata ==========

  // GetMediaMetadata returns metadata for a media.
  rpc GetMediaMetadata(GetMediaMetadataRequest) returns (GetMediaMetadataResponse) {
    option (google.api.http) = {get: "/api/v1/medias/{media_id}/metadata"};
  }
}

