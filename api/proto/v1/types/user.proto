syntax = "proto3";

package api.v1.services.types;

import "google/protobuf/timestamp.proto";

option go_package = "origadmin/application/origstudio/api/gen/v1/types;types";
option java_multiple_files = true;
option java_outer_classname = "OrigStudioServiceTypeUserProto";
option java_package = "com.origstudio.api.v1.services.types";
option objc_class_prefix = "OrigStudio";

// UserStatus defines the lifecycle status of a User.
enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_PENDING = 1;
  USER_STATUS_ACTIVE = 2;
  USER_STATUS_INACTIVE = 3;
  USER_STATUS_SUSPENDED = 4;
  USER_STATUS_REJECTED = 5;
}

// UserProfile holds the profile information of a user.
message UserProfile {
  string avatar = 1 [json_name = "avatar"];
  string gender = 2 [json_name = "gender"];
  string name = 3 [json_name = "name"];
  string bio = 4 [json_name = "bio"];
  string website = 5 [json_name = "website"];
  string location = 6 [json_name = "location"];
}

// UserSetting holds the personalized settings of a user.
message UserSetting {
  string theme = 1 [json_name = "theme"];
  string language = 2 [json_name = "language"];
  string timezone = 3 [json_name = "timezone"];
  map<string, string> preferences = 4 [json_name = "preferences"];
}

// User is the model entity for the User schema.
message User {
  string id = 1 [json_name = "id"];
  string create_author = 2 [json_name = "create_author"];
  string update_author = 3 [json_name = "update_author"];
  google.protobuf.Timestamp create_time = 4 [json_name = "create_time"];
  google.protobuf.Timestamp update_time = 5 [json_name = "update_time"];
  reserved 6;  // formerly uuid, removed as id is already UUIDv7
  string username = 7 [json_name = "username"];
  string nickname = 8 [json_name = "nickname"];
  string password = 9 [json_name = "password"];
  string phone = 10 [json_name = "phone"];
  string email = 11 [json_name = "email"];
  string avatar = 12 [json_name = "avatar"];
  UserStatus status = 13 [json_name = "status"];
  bool is_superuser = 14 [json_name = "is_superuser"];
  bool is_staff = 15 [json_name = "is_staff"];
  string last_login_ip = 16 [json_name = "last_login_ip"];
  string login_ip = 17 [json_name = "login_ip"];
  google.protobuf.Timestamp last_login_time = 18 [json_name = "last_login_time"];
  google.protobuf.Timestamp login_time = 19 [json_name = "login_time"];
  string slug = 20 [json_name = "slug"];
  string name = 21 [json_name = "name"];
  string role = 22 [json_name = "role"];
  bool is_editor = 23 [json_name = "is_editor"];
  bool is_manager = 24 [json_name = "is_manager"];
  string title = 25 [json_name = "title"];
  string description = 26 [json_name = "description"];
  string logo = 27 [json_name = "logo"];
  string location = 28 [json_name = "location"];
  int32 media_count = 29 [json_name = "media_count"];
  bool notification_on_comments = 30 [json_name = "notification_on_comments"];
  bool allow_contact = 31 [json_name = "allow_contact"];
  google.protobuf.Timestamp date_joined = 32 [json_name = "date_joined"];
  google.protobuf.Timestamp date_added = 33 [json_name = "date_added"];
  google.protobuf.Timestamp last_login = 34 [json_name = "last_login"];

  UserProfile profile = 50 [json_name = "profile"];
  UserSetting setting = 51 [json_name = "setting"];
  repeated Role roles = 100 [json_name = "roles"];
}

// Role is the model entity for the Role schema.
message Role {
  string id = 1 [json_name = "id"];
  google.protobuf.Timestamp create_time = 2 [json_name = "create_time"];
  google.protobuf.Timestamp update_time = 3 [json_name = "update_time"];
  string keyword = 4 [json_name = "keyword"];
  string name = 5 [json_name = "name"];
  string description = 6 [json_name = "description"];
  int32 type = 7 [json_name = "type"];
  int32 sequence = 8 [json_name = "sequence"];
  int32 status = 9 [json_name = "status"];

  repeated User users = 101 [json_name = "users"];
  repeated Permission permissions = 102 [json_name = "permissions"];
}

// Permission is the model entity for the Permission schema.
message Permission {
  string id = 1 [json_name = "id"];
  google.protobuf.Timestamp create_time = 2 [json_name = "create_time"];
  google.protobuf.Timestamp update_time = 3 [json_name = "update_time"];
  string keyword = 4 [json_name = "keyword"];
  string name = 5 [json_name = "name"];
  string description = 6 [json_name = "description"];
  string type = 7 [json_name = "type"];
  string resource_type = 8 [json_name = "resource_type"];
  string action = 9 [json_name = "action"];
  int32 sequence = 10 [json_name = "sequence"];
  int32 status = 11 [json_name = "status"];
  string parent_id = 12 [json_name = "parent_id"];
}

// UserRole is the many-to-many relation between User and Role.
message UserRole {
  string id = 1 [json_name = "id"];
  string user_id = 2 [json_name = "user_id"];
  string role_id = 3 [json_name = "role_id"];
}
