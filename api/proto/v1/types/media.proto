syntax = "proto3";

package api.v1.services.types;

import "google/protobuf/timestamp.proto";
import "v1/types/user.proto";

option go_package = "origadmin/application/origcms/api/gen/v1/types;types";
option java_multiple_files = true;
option java_outer_classname = "OrigCMSServiceTypeMediaProto";
option java_package = "com.origcms.api.v1.services.types";
option objc_class_prefix = "OrigCMS";

// Privacy defines the visibility/access level for Media, Channel, and Playlist.
enum Privacy {
  PRIVACY_UNSPECIFIED = 0;
  PRIVACY_PUBLIC = 1;
  PRIVACY_PRIVATE = 2;
  PRIVACY_UNLISTED = 3;
  PRIVACY_PAID = 4;
  PRIVACY_SUBSCRIBERS_ONLY = 5;
}

// TagStatus defines the status of a Tag.
enum TagStatus {
  TAG_STATUS_UNSPECIFIED = 0;
  TAG_STATUS_INACTIVE = 1;
  TAG_STATUS_ACTIVE = 2;
}

// PlaylistStatus defines the status of a Playlist.
enum PlaylistStatus {
  PLAYLIST_STATUS_UNSPECIFIED = 0;
  PLAYLIST_STATUS_ACTIVE = 1;
  PLAYLIST_STATUS_INACTIVE = 2;
  PLAYLIST_STATUS_DRAFT = 3;
  PLAYLIST_STATUS_ARCHIVED = 4;
}

// Media is the model entity for Media.
message Media {
  string id = 1 [json_name = "id"];
  google.protobuf.Timestamp create_time = 2 [json_name = "create_time"];
  google.protobuf.Timestamp update_time = 3 [json_name = "update_time"];
  string title = 4 [json_name = "title"];
  string description = 5 [json_name = "description"];
  string type = 6 [json_name = "type"];
  string url = 7 [json_name = "url"];
  string thumbnail = 8 [json_name = "thumbnail"];
  int32 duration = 9 [json_name = "duration"];
  int64 size = 10 [json_name = "size"];
  int32 width = 11 [json_name = "width"];
  int32 height = 12 [json_name = "height"];
  string mime_type = 13 [json_name = "mime_type"];
  Privacy privacy = 14 [json_name = "privacy"];
  string state = 15 [json_name = "state"];
  int64 view_count = 16 [json_name = "view_count"];
  int64 like_count = 17 [json_name = "like_count"];
  int64 dislike_count = 18 [json_name = "dislike_count"];
  int64 comment_count = 19 [json_name = "comment_count"];
  int64 favorite_count = 20 [json_name = "favorite_count"];
  int64 share_count = 21 [json_name = "share_count"];
  int64 download_count = 22 [json_name = "download_count"];
  string user_id = 23 [json_name = "user_id"];
  int64 category_id = 24 [json_name = "category_id"];
  repeated string tags = 25 [json_name = "tags"];
  string hls_file = 26 [json_name = "hls_file"];
  string encoding_status = 27 [json_name = "encoding_status"];
  string uuid = 28 [json_name = "uuid"];
  string preview_file_path = 29 [json_name = "preview_file_path"];
  string short_token = 43 [json_name = "short_token"];
  google.protobuf.Timestamp published_at = 32 [json_name = "published_at"];
  bool allow_download = 33 [json_name = "allow_download"];
  bool enable_comments = 34 [json_name = "enable_comments"];
  bool featured = 35 [json_name = "featured"];
  int32 reported_times = 37 [json_name = "reported_times"];
  string extension = 38 [json_name = "extension"];
  string md5sum = 39 [json_name = "md5sum"];
  string poster = 40 [json_name = "poster"];
  string review_status = 41 [json_name = "review_status"];
  bool listable = 42 [json_name = "listable"];
  string channel_id = 44 [json_name = "channel_id"];
  string sprite_status = 45 [json_name = "sprite_status"];
  string sprite_path = 46 [json_name = "sprite_path"];
  string vtt_path = 47 [json_name = "vtt_path"];
  double thumbnail_time = 48 [json_name = "thumbnail_time"];
  string create_author = 49 [json_name = "create_author"];
  string update_author = 53 [json_name = "update_author"];

  User user = 50 [json_name = "user"];
  Category category = 51 [json_name = "category"];
  Channel channel = 52 [json_name = "channel"];
}

// EncodeProfile is the model entity for EncodeProfile.
message EncodeProfile {
  int64 id = 1 [json_name = "id"];
  string name = 2 [json_name = "name"];
  string description = 3 [json_name = "description"];
  string extension = 4 [json_name = "extension"];
  string resolution = 5 [json_name = "resolution"];
  string video_codec = 6 [json_name = "video_codec"];
  string video_bitrate = 7 [json_name = "video_bitrate"];
  string audio_codec = 8 [json_name = "audio_codec"];
  string audio_bitrate = 9 [json_name = "audio_bitrate"];
  string bento_parameters = 10 [json_name = "bento_parameters"];
  bool is_active = 11 [json_name = "is_active"];
  google.protobuf.Timestamp create_time = 12 [json_name = "create_time"];
  google.protobuf.Timestamp update_time = 13 [json_name = "update_time"];
}

// EncodingTask is the model entity for EncodingTask.
message EncodingTask {
  string id = 1 [json_name = "id"];
  string media_id = 2 [json_name = "media_id"];
  int64 profile_id = 3 [json_name = "profile_id"];
  string status = 4 [json_name = "status"];
  int32 progress = 5 [json_name = "progress"];
  string output_path = 6 [json_name = "output_path"];
  string error_message = 7 [json_name = "error_message"];
  bool chunk = 8 [json_name = "chunk"];
  google.protobuf.Timestamp create_time = 9 [json_name = "create_time"];
  google.protobuf.Timestamp update_time = 10 [json_name = "update_time"];
}

// Category is the model entity for Category.
message Category {
  int64 id = 1 [json_name = "id"];
  google.protobuf.Timestamp create_time = 2 [json_name = "create_time"];
  google.protobuf.Timestamp update_time = 3 [json_name = "update_time"];
  string name = 4 [json_name = "name"];
  string slug = 5 [json_name = "slug"];
  string description = 6 [json_name = "description"];
  string thumbnail = 7 [json_name = "thumbnail"];
  string listings_thumbnail = 8 [json_name = "listings_thumbnail"];
  string icon = 9 [json_name = "icon"];
  string color = 10 [json_name = "color"];
  int64 parent_id = 11 [json_name = "parent_id"];
  int32 sequence = 12 [json_name = "sequence"];
  int32 status = 13 [json_name = "status"];
  int64 media_count = 14 [json_name = "media_count"];
  bool is_global = 15 [json_name = "is_global"];
  bool is_rbac_category = 16 [json_name = "is_rbac_category"];
  string identity_provider = 17 [json_name = "identity_provider"];
  string user_id = 18 [json_name = "user_id"];
}

// Tag is the model entity for Tag.
message Tag {
  int64 id = 1 [json_name = "id"];
  google.protobuf.Timestamp create_time = 2 [json_name = "create_time"];
  google.protobuf.Timestamp update_time = 3 [json_name = "update_time"];
  string name = 4 [json_name = "name"];
  string slug = 5 [json_name = "slug"];
  string description = 6 [json_name = "description"];
  string color = 7 [json_name = "color"];
  TagStatus status = 8 [json_name = "status"];
  int64 media_count = 9 [json_name = "media_count"];
  string listings_thumbnail = 10 [json_name = "listings_thumbnail"];
}

// Comment is the model entity for Comment.
message Comment {
  string id = 1 [json_name = "id"];
  google.protobuf.Timestamp create_time = 2 [json_name = "create_time"];
  google.protobuf.Timestamp update_time = 3 [json_name = "update_time"];
  string content = 4 [json_name = "content"];
  string user_id = 5 [json_name = "user_id"];
  string media_id = 6 [json_name = "media_id"];
  string parent_id = 7 [json_name = "parent_id"];
  int64 like_count = 8 [json_name = "like_count"];
  string status = 9 [json_name = "status"];
  int32 report_count = 10 [json_name = "report_count"];
  string moderated_by = 11 [json_name = "moderated_by"];
  google.protobuf.Timestamp moderated_at = 12 [json_name = "moderated_at"];
  google.protobuf.Timestamp add_date = 13 [json_name = "add_date"];
}

// Like is the model entity for Like.
message Like {
  string id = 1 [json_name = "id"];
  google.protobuf.Timestamp create_time = 2 [json_name = "create_time"];
  string user_id = 3 [json_name = "user_id"];
  string media_id = 4 [json_name = "media_id"];
  string type = 5 [json_name = "type"];
}

// Favorite is the model entity for Favorite.
message Favorite {
  string id = 1 [json_name = "id"];
  google.protobuf.Timestamp create_time = 2 [json_name = "create_time"];
  string user_id = 3 [json_name = "user_id"];
  string media_id = 4 [json_name = "media_id"];
  string playlist_id = 5 [json_name = "playlist_id"];
}

// Playlist is the model entity for Playlist.
message Playlist {
  string id = 1 [json_name = "id"];
  google.protobuf.Timestamp create_time = 2 [json_name = "create_time"];
  google.protobuf.Timestamp update_time = 3 [json_name = "update_time"];
  string title = 4 [json_name = "title"];
  string description = 5 [json_name = "description"];
  string thumbnail = 6 [json_name = "thumbnail"];
  string user_id = 7 [json_name = "user_id"];
  Privacy privacy = 8 [json_name = "privacy"];
  PlaylistStatus status = 9 [json_name = "status"];
  int64 media_count = 10 [json_name = "media_count"];
  string short_token = 11 [json_name = "short_token"];
  google.protobuf.Timestamp add_date = 12 [json_name = "add_date"];
}

// ChannelStatus defines the lifecycle status of a Channel.
enum ChannelStatus {
  CHANNEL_STATUS_UNSPECIFIED = 0;
  CHANNEL_STATUS_ACTIVE = 1;
  CHANNEL_STATUS_INACTIVE = 2;
  CHANNEL_STATUS_SUSPENDED = 3;
  CHANNEL_STATUS_PENDING_REVIEW = 4;
}

// ContentVisibility defines who can see a content item.
enum ContentVisibility {
  CONTENT_VISIBILITY_UNSPECIFIED = 0;
  CONTENT_VISIBILITY_PUBLIC = 1;
  CONTENT_VISIBILITY_PRIVATE = 2;
  CONTENT_VISIBILITY_PAID = 3;
}

// ChannelLink represents an external link.
message ChannelLink {
  string type = 1 [json_name = "type"];
  string platform = 2 [json_name = "platform"];
  string url = 3 [json_name = "url"];
  string title = 4 [json_name = "title"];
}

// Channel is the model entity for Channel.
message Channel {
  string id = 1 [json_name = "id"];
  google.protobuf.Timestamp create_time = 2 [json_name = "create_time"];
  google.protobuf.Timestamp update_time = 3 [json_name = "update_time"];
  string title = 4 [json_name = "title"];
  string description = 5 [json_name = "description"];
  string banner_logo = 6 [json_name = "banner_logo"];     // DEPRECATED, use banner
  string user_id = 7 [json_name = "user_id"];
  Privacy privacy = 8 [json_name = "privacy"];
  int64 subscriber_count = 9 [json_name = "subscriber_count"];
  int64 media_count = 10 [json_name = "media_count"];
  string short_token = 11 [json_name = "short_token"];
  google.protobuf.Timestamp add_date = 12 [json_name = "add_date"]; // DEPRECATED

  // NEW FIELDS (start from field number 20 to reserve space)
  string name = 20 [json_name = "name"];
  string slug = 21 [json_name = "slug"];
  string handle = 22 [json_name = "handle"];
  string avatar = 23 [json_name = "avatar"];
  string banner = 24 [json_name = "banner"];
  ChannelStatus status = 25 [json_name = "status"];
  // NOTE: is_default (field 26) REMOVED in v2 -- per A009 no default channel
  bool is_verified = 27 [json_name = "is_verified"];
  repeated string tags = 28 [json_name = "tags"];
  int64 category_id = 29 [json_name = "category_id"];
  int32 article_count = 30 [json_name = "article_count"];
  int64 total_views = 31 [json_name = "total_views"];
  repeated ChannelLink links = 32 [json_name = "links"];

  // Edge data
  User user = 50 [json_name = "user"];
  Category category = 51 [json_name = "category"];

  // View context (returned by single-channel GET, not stored in DB)
  bool is_owner = 60 [json_name = "is_owner"];
  bool is_subscribed = 61 [json_name = "is_subscribed"];
}

// HandleResolution is the response for /@username resolution.
message HandleResolution {
  enum ResolutionType {
    RESOLUTION_TYPE_UNSPECIFIED = 0;
    RESOLUTION_TYPE_CHANNEL = 1;
    RESOLUTION_TYPE_USER = 2;
    RESOLUTION_TYPE_NOT_FOUND = 3;
  }
  ResolutionType type = 1 [json_name = "type"];
  Channel channel = 2 [json_name = "channel"];  // Set if type=CHANNEL
  User user = 3 [json_name = "user"];            // Set if type=USER
}

// ChannelLimits represents channel creation limits for a user.
message ChannelLimits {
  int32 max_channels = 1 [json_name = "max_channels"];     // -1 = unlimited
  int32 current_count = 2 [json_name = "current_count"];
  bool can_create = 3 [json_name = "can_create"];
}

// ContentVisibilityCounts represents counts by visibility level.
message ContentVisibilityCounts {
  int32 public_count = 1 [json_name = "public_count"];
  int32 private_count = 2 [json_name = "private_count"];
  int32 paid_count = 3 [json_name = "paid_count"];
  int32 total_count = 4 [json_name = "total_count"];
}

// Subtitle is the model entity for Subtitle.
message Subtitle {
  string id = 1 [json_name = "id"];
  google.protobuf.Timestamp create_time = 2 [json_name = "create_time"];
  string media_id = 3 [json_name = "media_id"];
  string language = 4 [json_name = "language"];
  string file_url = 5 [json_name = "file_url"];
  string label = 6 [json_name = "label"];
}

// MediaVariant is the model entity for MediaVariant (encoding output).
message MediaVariant {
  string id = 1 [json_name = "id"];
  string media_id = 2 [json_name = "media_id"];
  string profile_id = 3 [json_name = "profile_id"];
  string resolution = 4 [json_name = "resolution"];
  string url = 5 [json_name = "url"];
  int64 size = 6 [json_name = "size"];
  string status = 7 [json_name = "status"];
}

// MediaMetadata is the model entity for MediaMetadata.
message MediaMetadata {
  string id = 1 [json_name = "id"];
  string media_id = 2 [json_name = "media_id"];
  int32 duration = 3 [json_name = "duration"];
  int64 bitrate = 4 [json_name = "bitrate"];
  string video_codec = 5 [json_name = "video_codec"];
  string audio_codec = 6 [json_name = "audio_codec"];
  float frame_rate = 7 [json_name = "frame_rate"];
  int32 width = 8 [json_name = "width"];
  int32 height = 9 [json_name = "height"];
}

// HistoryItem is the model entity for watch history.
// BREAKING CHANGE from previous version:
//   - media_id -> content_id (supports multi-content-type)
//   - progress -> progress_seconds (clarified unit)
//   - duration -> duration_seconds (clarified unit)
//   - added content_type field
message HistoryItem {
  string id = 1 [json_name = "id"];
  google.protobuf.Timestamp create_time = 2 [json_name = "create_time"];
  string user_id = 3 [json_name = "user_id"];
  string content_id = 4 [json_name = "content_id"];            // RENAMED from media_id
  int32 progress_seconds = 5 [json_name = "progress_seconds"]; // RENAMED from progress
  int32 duration_seconds = 6 [json_name = "duration_seconds"]; // RENAMED from duration
  bool is_finished = 7 [json_name = "is_finished"];
  google.protobuf.Timestamp last_watched_at = 8 [json_name = "last_watched_at"];
  ContentType content_type = 9 [json_name = "content_type"];   // NEW
}

// ContentType defines the type of content for history tracking.
enum ContentType {
  CONTENT_TYPE_UNSPECIFIED = 0;
  CONTENT_TYPE_VIDEO = 1;
  CONTENT_TYPE_ARTICLE = 2;
  CONTENT_TYPE_AUDIO = 3;
}

// Review is the model entity for content review.
message Review {
  string id = 1 [json_name = "id"];
  google.protobuf.Timestamp create_time = 2 [json_name = "create_time"];
  google.protobuf.Timestamp update_time = 3 [json_name = "update_time"];
  string media_id = 4 [json_name = "media_id"];
  string reviewer_id = 5 [json_name = "reviewer_id"];
  string status = 6 [json_name = "status"];
  string reason = 7 [json_name = "reason"];
  string notes = 8 [json_name = "notes"];
}

// StatPoint is a single data point for statistics.
message StatPoint {
  string date = 1 [json_name = "date"];
  int64 value = 2 [json_name = "value"];
}
