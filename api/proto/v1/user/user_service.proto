syntax = "proto3";

package api.v1.services.user;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "v1/types/user.proto";
import "v1/types/media.proto";

option go_package = "origadmin/application/origcms/api/gen/v1/user;user";
option java_multiple_files = true;
option java_outer_classname = "OrigCMSServiceUserProto";
option java_package = "com.origcms.api.v1.services.user";
option objc_class_prefix = "OrigCMSUser";

// The user service definition.
service UserService {
  // ========== Auth Module (moved from /users to /auth) ==========
  
  // Login authenticates a user and returns JWT tokens.
  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/login"
      body: "*"
    };
  }

  // Logout invalidates the current session.
  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/logout"
      body: "*"
    };
  }

  // RefreshToken refreshes the access token using a refresh token.
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/refresh"
      body: "*"
    };
  }

  // Register creates a new user account.
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/register"
      body: "*"
    };
  }

  // ForgotPassword initiates password reset process.
  rpc ForgotPassword(ForgotPasswordRequest) returns (ForgotPasswordResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/forgot-password"
      body: "*"
    };
  }

  // ResetPassword resets user password with token.
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/reset-password"
      body: "*"
    };
  }

  // GetCurrentUser returns the current authenticated user (moved from /auth/me to /me).
  // This is kept for backward compatibility, use MeService for new code.
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse) {
    option (google.api.http) = {get: "/api/v1/auth/me"};
  }

  // ========== Me Module (Current User) ==========

  // GetMe returns the current user's information.
  rpc GetMe(GetMeRequest) returns (GetMeResponse) {
    option (google.api.http) = {get: "/api/v1/me"};
  }

  // UpdateMe updates the current user's information.
  rpc UpdateMe(UpdateMeRequest) returns (UpdateMeResponse) {
    option (google.api.http) = {
      put: "/api/v1/me"
      body: "*"
    };
  }

  // UpdateMyPassword updates the current user's password.
  rpc UpdateMyPassword(UpdateMyPasswordRequest) returns (UpdateMyPasswordResponse) {
    option (google.api.http) = {
      put: "/api/v1/me/password"
      body: "*"
    };
  }

  // GetMyPlaylists returns the current user's playlists.
  rpc GetMyPlaylists(GetMyPlaylistsRequest) returns (GetMyPlaylistsResponse) {
    option (google.api.http) = {get: "/api/v1/me/playlists"};
  }

  // GetMyFavorites returns the current user's favorites.
  rpc GetMyFavorites(GetMyFavoritesRequest) returns (GetMyFavoritesResponse) {
    option (google.api.http) = {get: "/api/v1/me/favorites"};
  }

  // GetMyLikes returns the current user's likes.
  rpc GetMyLikes(GetMyLikesRequest) returns (GetMyLikesResponse) {
    option (google.api.http) = {get: "/api/v1/me/likes"};
  }

  // GetMySubscriptions returns the current user's channel subscriptions.
  rpc GetMySubscriptions(GetMySubscriptionsRequest) returns (GetMySubscriptionsResponse) {
    option (google.api.http) = {get: "/api/v1/me/subscriptions"};
  }

  // GetMyHistory returns the current user's watch history.
  rpc GetMyHistory(GetMyHistoryRequest) returns (GetMyHistoryResponse) {
    option (google.api.http) = {get: "/api/v1/me/history"};
  }

  // UpsertHistory creates or updates a history record (progress reporting).
  rpc UpsertHistory(UpsertHistoryRequest) returns (UpsertHistoryResponse) {
    option (google.api.http) = {
      post: "/api/v1/me/history"
      body: "*"
    };
  }

  // SyncHistory batch-syncs history records (login merge).
  rpc SyncHistory(SyncHistoryRequest) returns (SyncHistoryResponse) {
    option (google.api.http) = {
      post: "/api/v1/me/history/sync"
      body: "*"
    };
  }

  // ClearHistory clears all watch history for the current user.
  rpc ClearHistory(ClearHistoryRequest) returns (ClearHistoryResponse) {
    option (google.api.http) = {delete: "/api/v1/me/history"};
  }

  // RemoveHistoryItem removes a single history record.
  rpc RemoveHistoryItem(RemoveHistoryItemRequest) returns (RemoveHistoryItemResponse) {
    option (google.api.http) = {delete: "/api/v1/me/history/{id}"};
  }

  // GetMyStats returns the current user's statistics.
  rpc GetMyStats(GetMyStatsRequest) returns (GetMyStatsResponse) {
    option (google.api.http) = {get: "/api/v1/me/stats"};
  }

  // ========== User Resource Module ==========

  // ListUsers returns a list of users.
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {get: "/api/v1/users"};
  }

  // GetUser returns a user by ID.
  rpc GetUser(GetUserRequest) returns (GetUserResponse) {
    option (google.api.http) = {get: "/api/v1/users/{id}"};
  }

  // CreateUser creates a new user.
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
    option (google.api.http) = {
      post: "/api/v1/users"
      body: "*"
    };
  }

  // UpdateUser updates an existing user.
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
    option (google.api.http) = {
      put: "/api/v1/users/{user.id}"
      body: "*"
    };
  }

  // DeleteUser deletes a user.
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {
    option (google.api.http) = {delete: "/api/v1/users/{id}"};
  }

  // UpdateUserStatus updates a user's status.
  rpc UpdateUserStatus(UpdateUserStatusRequest) returns (UpdateUserStatusResponse) {
    option (google.api.http) = {
      patch: "/api/v1/users/{id}/status"
      body: "*"
    };
  }

  // UpdateUserRoles updates a user's roles.
  rpc UpdateUserRoles(UpdateUserRolesRequest) returns (UpdateUserRolesResponse) {
    option (google.api.http) = {
      put: "/api/v1/users/{id}/roles"
      body: "*"
    };
  }

  // ChangeUserPassword changes a user's password.
  rpc ChangeUserPassword(ChangeUserPasswordRequest) returns (ChangeUserPasswordResponse) {
    option (google.api.http) = {
      post: "/api/v1/users/{id}/password"
      body: "*"
    };
  }

  // VerifyPassword verifies if the provided password matches the user's password.
  rpc VerifyPassword(VerifyPasswordRequest) returns (VerifyPasswordResponse) {
    option (google.api.http) = {
      post: "/api/v1/users/verify-password"
      body: "*"
    };
  }

  // ListUserRoles returns roles assigned to a user.
  rpc ListUserRoles(ListUserRolesRequest) returns (ListUserRolesResponse) {
    option (google.api.http) = {get: "/api/v1/users/{id}/roles"};
  }

  // GetUserStats returns statistics for a user.
  rpc GetUserStats(GetUserStatsRequest) returns (GetUserStatsResponse) {
    option (google.api.http) = {get: "/api/v1/users/{id}/stats"};
  }

  // GetUserPlaylists returns public playlists for a user.
  rpc GetUserPlaylists(GetUserPlaylistsRequest) returns (GetUserPlaylistsResponse) {
    option (google.api.http) = {get: "/api/v1/users/{id}/playlists"};
  }

  // GetUserFollowers returns followers for a user.
  rpc GetUserFollowers(GetUserFollowersRequest) returns (GetUserFollowersResponse) {
    option (google.api.http) = {get: "/api/v1/users/{id}/followers"};
  }
}

// ========== Auth Messages ==========

// LoginRequest is the request message for user login.
message LoginRequest {
  // The username or email.
  string username = 1 [json_name = "username"];
  // The plain text password.
  string password = 2 [json_name = "password"];
}

// LoginResponse is the response message for user login.
message LoginResponse {
  // The access token.
  string access_token = 1 [json_name = "access_token"];
  // The refresh token.
  string refresh_token = 2 [json_name = "refresh_token"];
  // Token expiration timestamp.
  int64 expires_at = 3 [json_name = "expires_at"];
  // The user info.
  api.v1.services.types.User user = 4 [json_name = "user"];
}

// LogoutRequest is the request message for user logout.
message LogoutRequest {
  // The access token to invalidate.
  string access_token = 1 [json_name = "access_token"];
}

// LogoutResponse is the response message for user logout.
message LogoutResponse {
  // Whether the logout was successful.
  bool success = 1 [json_name = "success"];
}

// RefreshTokenRequest is the request message for refreshing token.
message RefreshTokenRequest {
  // The refresh token.
  string refresh_token = 1 [json_name = "refresh_token"];
}

// RefreshTokenResponse is the response message for refreshing token.
message RefreshTokenResponse {
  // The new access token.
  string access_token = 1 [json_name = "access_token"];
  // The new refresh token (optional, may be same as input).
  string refresh_token = 2 [json_name = "refresh_token"];
  // Token expiration timestamp.
  int64 expires_at = 3 [json_name = "expires_at"];
}

// RegisterRequest is the request message for user registration.
message RegisterRequest {
  // The username.
  string username = 1 [json_name = "username"];
  // The email.
  string email = 2 [json_name = "email"];
  // The password.
  string password = 3 [json_name = "password"];
  // Optional display name.
  string nickname = 4 [json_name = "nickname"];
}

// RegisterResponse is the response message for user registration.
message RegisterResponse {
  // The created user.
  api.v1.services.types.User user = 1 [json_name = "user"];
  // The access token.
  string access_token = 2 [json_name = "access_token"];
  // The refresh token.
  string refresh_token = 3 [json_name = "refresh_token"];
  // Token expiration timestamp.
  int64 expires_at = 4 [json_name = "expires_at"];
}

// ForgotPasswordRequest is the request message for forgot password.
message ForgotPasswordRequest {
  // The email address.
  string email = 1 [json_name = "email"];
}

// ForgotPasswordResponse is the response message for forgot password.
message ForgotPasswordResponse {
  // Whether the request was successful.
  bool success = 1 [json_name = "success"];
  // Message to display to user.
  string message = 2 [json_name = "message"];
}

// ResetPasswordRequest is the request message for resetting password.
message ResetPasswordRequest {
  // The reset token.
  string token = 1 [json_name = "token"];
  // The new password.
  string password = 2 [json_name = "password"];
}

// ResetPasswordResponse is the response message for resetting password.
message ResetPasswordResponse {
  // Whether the reset was successful.
  bool success = 1 [json_name = "success"];
}

// GetCurrentUserRequest is the request message for getting current user.
message GetCurrentUserRequest {}

// GetCurrentUserResponse is the response message for getting current user.
message GetCurrentUserResponse {
  // The current user.
  api.v1.services.types.User user = 1 [json_name = "user"];
}

// ========== Me Messages ==========

// GetMeRequest is the request message for getting current user info.
message GetMeRequest {}

// GetMeResponse is the response message for getting current user info.
message GetMeResponse {
  // The current user.
  api.v1.services.types.User user = 1 [json_name = "user"];
}

// UpdateMeRequest is the request message for updating current user.
message UpdateMeRequest {
  // The user fields to update.
  string nickname = 1 [json_name = "nickname"];
  string avatar = 2 [json_name = "avatar"];
  string bio = 3 [json_name = "bio"];
  string email = 4 [json_name = "email"];
  string phone = 5 [json_name = "phone"];
}

// UpdateMeResponse is the response message for updating current user.
message UpdateMeResponse {
  // The updated user.
  api.v1.services.types.User user = 1 [json_name = "user"];
}

// UpdateMyPasswordRequest is the request message for updating password.
message UpdateMyPasswordRequest {
  // The current password.
  string current_password = 1 [json_name = "current_password"];
  // The new password.
  string new_password = 2 [json_name = "new_password"];
}

// UpdateMyPasswordResponse is the response message for updating password.
message UpdateMyPasswordResponse {
  // Whether the update was successful.
  bool success = 1 [json_name = "success"];
}

// GetMyPlaylistsRequest is the request message for getting my playlists.
message GetMyPlaylistsRequest {
  int32 page = 1 [json_name = "page"];
  int32 page_size = 2 [json_name = "page_size"];
}

// GetMyPlaylistsResponse is the response message for getting my playlists.
message GetMyPlaylistsResponse {
  int32 total = 1 [json_name = "total"];
  repeated api.v1.services.types.Playlist items = 2 [json_name = "items"];
  int32 page = 3 [json_name = "page"];
  int32 page_size = 4 [json_name = "page_size"];
}

// GetMyFavoritesRequest is the request message for getting my favorites.
message GetMyFavoritesRequest {
  int32 page = 1 [json_name = "page"];
  int32 page_size = 2 [json_name = "page_size"];
}

// GetMyFavoritesResponse is the response message for getting my favorites.
message GetMyFavoritesResponse {
  int32 total = 1 [json_name = "total"];
  repeated api.v1.services.types.Media items = 2 [json_name = "items"];
  int32 page = 3 [json_name = "page"];
  int32 page_size = 4 [json_name = "page_size"];
}

// GetMyLikesRequest is the request message for getting my likes.
message GetMyLikesRequest {
  int32 page = 1 [json_name = "page"];
  int32 page_size = 2 [json_name = "page_size"];
}

// GetMyLikesResponse is the response message for getting my likes.
message GetMyLikesResponse {
  int32 total = 1 [json_name = "total"];
  repeated api.v1.services.types.Like likes = 2 [json_name = "likes"];
  int32 page = 3 [json_name = "page"];
  int32 page_size = 4 [json_name = "page_size"];
}

// GetMySubscriptionsRequest is the request message for getting my subscriptions.
message GetMySubscriptionsRequest {
  int32 page = 1 [json_name = "page"];
  int32 page_size = 2 [json_name = "page_size"];
}

// GetMySubscriptionsResponse is the response message for getting my subscriptions.
message GetMySubscriptionsResponse {
  int32 total = 1 [json_name = "total"];
  repeated api.v1.services.types.Channel items = 2 [json_name = "items"];
  int32 page = 3 [json_name = "page"];
  int32 page_size = 4 [json_name = "page_size"];
}

// GetMyHistoryRequest is the request message for getting my history.
message GetMyHistoryRequest {
  int32 page = 1 [json_name = "page"];
  int32 page_size = 2 [json_name = "page_size"];
  // Filter by content type (optional).
  api.v1.services.types.ContentType content_type = 3 [json_name = "content_type"];
}

// GetMyHistoryResponse is the response message for getting my history.
message GetMyHistoryResponse {
  int32 total = 1 [json_name = "total"];
  repeated api.v1.services.types.HistoryItem items = 2 [json_name = "items"];
  int32 page = 3 [json_name = "page"];
  int32 page_size = 4 [json_name = "page_size"];
}

// GetMyStatsRequest is the request message for getting my stats.
message GetMyStatsRequest {}

// GetMyStatsResponse is the response message for getting my stats.
message GetMyStatsResponse {
  int32 total_views = 1 [json_name = "total_views"];
  int32 total_likes = 2 [json_name = "total_likes"];
  int32 total_medias = 3 [json_name = "total_medias"];
  int32 total_followers = 4 [json_name = "total_followers"];
  int32 total_following = 5 [json_name = "total_following"];
}

// ========== User Resource Messages ==========

// ListUsersRequest is the request message for listing users.
message ListUsersRequest {
  // The page number.
  int32 page = 1 [json_name = "page"];
  // The maximum number of items to return.
  int32 page_size = 2 [json_name = "page_size"];
  // The next_page_token value returned from a previous List request, if any.
  string page_token = 3 [json_name = "page_token"];
  // Filter by keyword (username, email, phone, nickname)
  string keyword = 4 [json_name = "keyword"];
  // Filter by status
  optional int32 status = 5 [json_name = "status"];
  // Whether to include roles in the response.
  bool with_roles = 6 [json_name = "with_roles"];
}

// ListUsersResponse is the response message for listing users.
message ListUsersResponse {
  // The total number of items in the list.
  int32 total = 1 [json_name = "total"];
  // The paging items
  repeated api.v1.services.types.User items = 2 [json_name = "items"];
  // The page number.
  int32 page = 3 [json_name = "page"];
  // The maximum number of items to return.
  int32 page_size = 4 [json_name = "page_size"];
  // Token to retrieve the next page of results, or empty if there are no
  // more results in the list.
  string next_page_token = 5 [json_name = "next_page_token"];
}

// GetUserRequest is the request message for getting a user.
message GetUserRequest {
  // The field will contain id of the resource requested.
  string id = 1;
  // Whether to include roles in the response.
  bool with_roles = 2 [json_name = "with_roles"];
  // Whether to include profile in the response.
  bool with_profile = 3 [json_name = "with_profile"];
  // Whether to include setting in the response.
  bool with_setting = 4 [json_name = "with_setting"];
}

// GetUserResponse is the response message for getting a user.
message GetUserResponse {
  // The user resource for get.
  api.v1.services.types.User user = 1 [json_name = "user"];
}

// CreateUserRequest is the request message for creating a user.
message CreateUserRequest {
  // The user resource to be created.
  api.v1.services.types.User user = 1;
  // The password to use for this user.
  // If this field is left empty, a random password will be generated by the server.
  string password = 2 [json_name = "password"];
  // For requests: Use this field to set the roles for the user.
  repeated string role_ids = 3 [json_name = "role_ids"];
}

// CreateUserResponse is the response message for creating a user.
message CreateUserResponse {
  // The user resource for create.
  api.v1.services.types.User user = 1 [json_name = "user"];
}

// UpdateUserRequest is the request message for updating a user.
message UpdateUserRequest {
  // The user resource which replaces the resource on the server.
  api.v1.services.types.User user = 1 [json_name = "user"];
  // The update mask applies to the resource.
  google.protobuf.FieldMask update_mask = 2 [json_name = "update_mask"];
  // For requests: Use this field to set or replace the list of roles for the user.
  repeated string role_ids = 3 [json_name = "role_ids"];
}

// UpdateUserResponse is the response message for updating a user.
message UpdateUserResponse {
  // The user resource for update.
  api.v1.services.types.User user = 1 [json_name = "user"];
}

// DeleteUserRequest is the request message for deleting a user.
message DeleteUserRequest {
  // The resource id of the user to be deleted.
  string id = 1;
}

// DeleteUserResponse is the response message for deleting a user.
message DeleteUserResponse {
  // The empty response body.
  google.protobuf.Empty empty = 1 [json_name = "empty"];
}

// UpdateUserStatusRequest is the request message for updating user status.
message UpdateUserStatusRequest {
  // The field will contain id of the resource requested.
  string id = 1 [json_name = "id"];
  // The status of the user.
  int32 status = 2 [json_name = "status"];
}

// UpdateUserStatusResponse is the response message for updating user status.
message UpdateUserStatusResponse {}

// UpdateUserRolesRequest is the request message for updating user roles.
message UpdateUserRolesRequest {
  // The field will contain id of the resource requested.
  string id = 1 [json_name = "id"];
  // For requests: Use this field to set or replace the list of roles for the user.
  repeated string role_ids = 2 [json_name = "role_ids"];
}

// UpdateUserRolesResponse is the response message for updating user roles.
message UpdateUserRolesResponse {
  api.v1.services.types.User user = 1 [json_name = "user"];
}

// ChangeUserPasswordRequest is the request message for changing user password.
message ChangeUserPasswordRequest {
  // The field will contain id of the resource requested.
  string id = 1 [json_name = "id"];
  // The password to use for this user (plain text, will be hashed).
  string password = 2 [json_name = "password"];
}

// ChangeUserPasswordResponse is the response message for changing user password.
message ChangeUserPasswordResponse {}

// VerifyPasswordRequest is the request message for verifying password.
message VerifyPasswordRequest {
  // The user ID.
  string user_id = 1 [json_name = "user_id"];
  // The username (alternative to user_id).
  string username = 2 [json_name = "username"];
  // The plain text password to verify.
  string password = 3 [json_name = "password"];
}

// VerifyPasswordResponse is the response message for verifying password.
message VerifyPasswordResponse {
  // True if the password is valid, false otherwise.
  bool valid = 1 [json_name = "valid"];
}

// ListUserRolesRequest is the request message for listing user roles.
message ListUserRolesRequest {
  // The field will contain id of the user requested.
  string id = 1 [json_name = "id"];
}

// ListUserRolesResponse is the response message for listing user roles.
message ListUserRolesResponse {
  // The total number of items in the list.
  int32 total = 1 [json_name = "total"];
  // The list of items
  repeated api.v1.services.types.Role items = 2 [json_name = "items"];
}

// GetUserStatsRequest is the request message for getting user stats.
message GetUserStatsRequest {
  string id = 1;
}

// GetUserStatsResponse is the response message for getting user stats.
message GetUserStatsResponse {
  int32 total_views = 1 [json_name = "total_views"];
  int32 total_likes = 2 [json_name = "total_likes"];
  int32 total_medias = 3 [json_name = "total_medias"];
  int32 total_followers = 4 [json_name = "total_followers"];
}

// GetUserPlaylistsRequest is the request message for getting user playlists.
message GetUserPlaylistsRequest {
  string id = 1;
  int32 page = 2 [json_name = "page"];
  int32 page_size = 3 [json_name = "page_size"];
}

// GetUserPlaylistsResponse is the response message for getting user playlists.
message GetUserPlaylistsResponse {
  int32 total = 1 [json_name = "total"];
  repeated api.v1.services.types.Playlist items = 2 [json_name = "items"];
  int32 page = 3 [json_name = "page"];
  int32 page_size = 4 [json_name = "page_size"];
}

// GetUserFollowersRequest is the request message for getting user followers.
message GetUserFollowersRequest {
  string id = 1;
  int32 page = 2 [json_name = "page"];
  int32 page_size = 3 [json_name = "page_size"];
}

// GetUserFollowersResponse is the response message for getting user followers.
message GetUserFollowersResponse {
  int32 total = 1 [json_name = "total"];
  repeated api.v1.services.types.User followers = 2 [json_name = "followers"];
  int32 page = 3 [json_name = "page"];
  int32 page_size = 4 [json_name = "page_size"];
}

// ========== History Messages ==========

// UpsertHistoryRequest is the request for creating/updating a history record.
message UpsertHistoryRequest {
  // The content ID (media_id or article_id).
  string content_id = 1 [json_name = "content_id"];
  // The content type.
  api.v1.services.types.ContentType content_type = 2 [json_name = "content_type"];
  // The progress in seconds.
  int32 progress_seconds = 3 [json_name = "progress_seconds"];
  // The total duration in seconds.
  int32 duration_seconds = 4 [json_name = "duration_seconds"];
}

// UpsertHistoryResponse is the response for upserting a history record.
message UpsertHistoryResponse {
  // The upserted history item.
  api.v1.services.types.HistoryItem item = 1 [json_name = "item"];
}

// SyncHistoryRequest is the request for batch-syncing history records.
message SyncHistoryRequest {
  // The local history items to merge with server.
  repeated api.v1.services.types.HistoryItem items = 1 [json_name = "items"];
}

// SyncHistoryResponse is the response for batch-syncing history records.
message SyncHistoryResponse {
  // The complete merged history list from server.
  repeated api.v1.services.types.HistoryItem items = 1 [json_name = "items"];
  // Number of items that were merged (updated or created).
  int32 merged_count = 2 [json_name = "merged_count"];
}

// ClearHistoryRequest is the request for clearing all history.
message ClearHistoryRequest {}

// ClearHistoryResponse is the response for clearing all history.
message ClearHistoryResponse {
  // Number of records deleted.
  int32 deleted_count = 1 [json_name = "deleted_count"];
}

// RemoveHistoryItemRequest is the request for removing a single history item.
message RemoveHistoryItemRequest {
  // The history record ID to remove.
  string id = 1;
}

// RemoveHistoryItemResponse is the response for removing a single history item.
message RemoveHistoryItemResponse {}
