syntax = "proto3";

package api.v1.common;

option go_package = "origadmin/application/origcms/api/gen/v1/common;common";
option java_multiple_files = true;
option java_outer_classname = "OrigCMSCommonProto";
option java_package = "com.origcms.api.v1.common";
option objc_class_prefix = "OrigCMSCommon";

// PaginationRequest contains standardized pagination parameters.
// Backend enforces: DefaultPageSize=20, MaxPageSize=100, HardLimit=1000.
// Values outside these bounds are automatically corrected.
message PaginationRequest {
  // Page number (1-based). Values < 1 are corrected to 1.
  int32 page = 1 [json_name = "page"];

  // Number of items per page. Values <= 0 default to 20.
  // Values > 100 are capped at 100.
  int32 page_size = 2 [json_name = "page_size"];

  // Opaque token for cursor-based pagination (alternative to page).
  // When provided, page is ignored.
  string page_token = 3 [json_name = "page_token"];
}

// PaginationResponse contains standardized pagination metadata.
message PaginationResponse {
  // Total number of items across all pages.
  int32 total = 1 [json_name = "total"];

  // Current page number (1-based).
  int32 page = 2 [json_name = "page"];

  // Current page size (may differ from requested if corrected).
  int32 page_size = 3 [json_name = "page_size"];

  // Total number of pages. Computed as ceil(total / page_size).
  int32 total_pages = 4 [json_name = "total_pages"];

  // Token for the next page (cursor-based pagination).
  string next_page_token = 5 [json_name = "next_page_token"];
}
