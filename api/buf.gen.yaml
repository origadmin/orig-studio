version: v2

managed:
  enabled: true

plugins:
  # OpenAPI v3 文档生成 (使用本地 protoc-gen-openapi 插件)
  - local: protoc-gen-openapi
    out: ../docs/api
    opt:
      - naming=proto
      - fq_schema_naming=true
    strategy: all

  # Go Protobuf 代码生成
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: gen
    opt:
      - paths=source_relative

  # Go gRPC 代码生成
  - remote: buf.build/grpc/go:v1.6.1
    out: gen
    opt:
      - paths=source_relative

  # gRPC-Gateway HTTP 反向代理生成
  - remote: buf.build/grpc-ecosystem/gateway:v2.26.3
    out: gen
    opt:
      - paths=source_relative
