name: Test

on:
  push:
    branches: [ main, feat-* ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.23'
  CGO_ENABLED: 0

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run tests
        env:
          GOWORK: off
        run: |
          go test -tags=dev -short $(go list -tags=dev ./... | grep -v '/tests/integration' | grep -v '/tests/e2e' | grep -v '/tests/bugs') -v -count=1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run go vet
        env:
          GOWORK: off
        run: go vet -tags=dev ./...
