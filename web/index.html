<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/logo-32.png"/>
    <link rel="icon" type="image/png" sizes="16x16" href="/logo-16.png"/>
    <link rel="apple-touch-icon" sizes="192x192" href="/logo-192.png"/>
    <title>OrigStudio - 内容管理系统</title>
    <script>
        (function() {
            try {
                var theme = localStorage.getItem('origstudio-theme') || 'default';
                var mode = localStorage.getItem('origstudio-color-mode') || 'system';
                var isDark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                document.documentElement.setAttribute('data-theme', theme);
                document.documentElement.classList.toggle('dark', isDark);
                if (theme !== 'default') {
                    var cachedCss = localStorage.getItem('origstudio-theme-css-' + theme);
                    if (cachedCss) {
                        var style = document.createElement('style');
                        style.id = 'theme-cache';
                        style.setAttribute('data-theme-id', theme);
                        style.textContent = cachedCss;
                        document.head.appendChild(style);
                    }
                }
            } catch(e) {
                document.documentElement.setAttribute('data-theme', 'default');
            }
        })();
    </script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/index.tsx"></script>
</body>
</html>
