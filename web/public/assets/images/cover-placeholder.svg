<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
    <defs>
        <linearGradient id="coverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
            <stop offset="50%" style="stop-color:#16213e;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1"/>
        </linearGradient>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
        </pattern>
    </defs>
    <rect width="1200" height="400" fill="url(#coverGrad)"/>
    <rect width="1200" height="400" fill="url(#grid)"/>
    <circle cx="200" cy="200" r="150" fill="rgba(102,126,234,0.1)"/>
    <circle cx="1000" cy="100" r="100" fill="rgba(118,75,162,0.1)"/>
    <circle cx="600" cy="300" r="80" fill="rgba(102,126,234,0.05)"/>
</svg>