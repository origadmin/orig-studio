<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="50%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#22d3ee"/>
    </linearGradient>
    <linearGradient id="iconGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  
  <!-- 装饰网格 -->
  <g opacity="0.05">
    <line x1="0" y1="50" x2="1200" y2="50" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="250" x2="1200" y2="250" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="350" x2="1200" y2="350" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- 装饰光晕 -->
  <ellipse cx="150" cy="200" rx="220" ry="140" fill="#6366f1" opacity="0.1"/>
  <ellipse cx="850" cy="200" rx="180" ry="130" fill="#22d3ee" opacity="0.05"/>
  
  <!-- 左侧图标 -->
  <g transform="translate(130, 200)">
    <polygon points="0,-70 61,-35 61,35 0,70 -61,35 -61,-35" 
             fill="none" stroke="url(#iconGrad2)" stroke-width="5" opacity="0.3"/>
    <polygon points="0,-48 42,-24 42,24 0,48 -42,24 -42,-24" 
             fill="none" stroke="url(#iconGrad2)" stroke-width="4" opacity="0.5"/>
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" 
             fill="url(#iconGrad2)"/>
    <circle cx="0" cy="0" r="9" fill="#fff"/>
    <circle cx="0" cy="-48" r="6" fill="#22d3ee"/>
    <circle cx="42" cy="24" r="6" fill="#22d3ee"/>
    <circle cx="-42" cy="24" r="6" fill="#22d3ee"/>
  </g>
  
  <!-- 主标题 -->
  <text x="230" y="150" font-family="system-ui, -apple-system, sans-serif" 
        font-size="48" font-weight="800" fill="#fff">
    ORIG-MEDIA
  </text>
  
  <!-- 副标题 -->
  <text x="230" y="180" font-family="system-ui, -apple-system, sans-serif" 
        font-size="16" fill="#a5b4fc">
    Modern Content Management System
  </text>
  
  <!-- 分隔线 -->
  <rect x="230" y="195" width="100" height="2" rx="1" fill="url(#accentGrad)"/>
  
  <!-- 特性标签 -->
  <g transform="translate(230, 215)">
    <rect x="0" y="0" width="65" height="22" rx="11" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
    <text x="32.5" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc">Flexible</text>
    
    <rect x="72" y="0" width="58" height="22" rx="11" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
    <text x="101" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc">Secure</text>
    
    <rect x="137" y="0" width="78" height="22" rx="11" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
    <text x="176" y="15" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a5b4fc">Open Source</text>
  </g>
  
  <!-- 右侧终端窗口 - 缩小窗口 -->
  <g transform="translate(650, 90)">
    <rect x="0" y="0" width="480" height="220" rx="6" fill="#0f0e24" stroke="#312e81" stroke-width="1"/>
    <!-- 窗口按钮 -->
    <circle cx="14" cy="12" r="5" fill="#ef4444"/>
    <circle cx="28" cy="12" r="5" fill="#fbbf24"/>
    <circle cx="42" cy="12" r="5" fill="#22c55e"/>
    <!-- 终端标题 -->
    <text x="240" y="15" text-anchor="middle" font-family="monospace" font-size="11" fill="#6b7280">Terminal — Deployment</text>
    
    <!-- 终端内容 -->
    <text x="14" y="42" font-family="monospace" font-size="13" fill="#22c55e">$</text>
    <text x="28" y="42" font-family="monospace" font-size="13" fill="#fff">git clone github.com/origadmin/orig-media</text>
    
    <text x="14" y="68" font-family="monospace" font-size="13" fill="#22c55e">$</text>
    <text x="28" y="68" font-family="monospace" font-size="13" fill="#fff">cd orig-media</text>
    
    <text x="14" y="94" font-family="monospace" font-size="13" fill="#6b7280"># Configure environment</text>
    <text x="14" y="120" font-family="monospace" font-size="13" fill="#22c55e">$</text>
    <text x="28" y="120" font-family="monospace" font-size="13" fill="#fff">cp .env.example .env</text>
    
    <text x="14" y="146" font-family="monospace" font-size="13" fill="#6b7280"># Start services</text>
    <text x="14" y="172" font-family="monospace" font-size="13" fill="#22c55e">$</text>
    <text x="28" y="172" font-family="monospace" font-size="13" fill="#fff">docker-compose up -d</text>
    
    <text x="14" y="200" font-family="monospace" font-size="13" fill="#22d3ee">✓</text>
    <text x="28" y="200" font-family="monospace" font-size="13" fill="#6b7280">http://localhost:8080</text>
  </g>
</svg>
